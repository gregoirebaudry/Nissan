<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Où est le Nissan ?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f2f2f7;
      color: #111;
    }

    .container {
      padding: 20px;
      max-width: 520px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    select {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #d2d2d7;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      font-size: 17px;
      border-radius: 12px;
      border: none;
      background: #007aff;
      color: white;
    }

    button:disabled {
      opacity: 0.5;
    }

    #map {
      height: 320px;
      border-radius: 12px;
      margin-top: 10px;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #0b57d0;
    }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
    }

    #modalContent {
      background: white;
      padding: 20px;
      border-radius: 16px;
      width: 80%;
      max-width: 300px;
      text-align: center;
    }

    .modalBtn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    .confirm {
      background: #007aff;
      color: white;
    }

    .cancel {
      background: #e5e5ea;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🚗 Où est le Nissan ?</h1>

  <div class="card">
    <select id="user"></select>
  </div>

  <div class="card">
    <button id="whereBtn" onclick="getLocation()">📍 Où est le Nissan ?</button>
    <button id="parkBtn" onclick="parkCar()">🚗 J’ai garé la voiture</button>
    <button onclick="openGoogleMaps()">🗺️ Ouvrir dans Google Maps</button>
    <div id="status">Le serveur gratuit peut mettre 20–60s à se réveiller.</div>
  </div>

  <div class="card">
    <div id="map"></div>
    <div id="info"></div>
  </div>
</div>

<!-- Custom Modal -->
<div id="modal">
  <div id="modalContent">
    <p>Confirmer que vous avez garé la voiture ici ?</p>
    <button id="confirmYes" class="modalBtn confirm">Confirmer</button>
    <button id="confirmNo" class="modalBtn cancel">Annuler</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx86TlKMqmybMKGrtGjCgjTlOhqEsuSISqKkak-jDE4WlC21nL2sNZ0ayjGkdOL08w1gw/exec";
const USERS = ["Constance","Christine","Marie","Clement","Gregoire","Laurent","Bastien"];

const userSelect = document.getElementById("user");
const whereBtn = document.getElementById("whereBtn");
const parkBtn = document.getElementById("parkBtn");
const statusEl = document.getElementById("status");

USERS.forEach(u => {
  let opt = document.createElement("option");
  opt.value = u;
  opt.innerText = u;
  userSelect.appendChild(opt);
});

let saved = localStorage.getItem("user");
if (saved) userSelect.value = saved;

userSelect.onchange = () => {
  localStorage.setItem("user", userSelect.value);
};

let map = L.map("map").setView([48.8566, 2.3522], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let marker, lat=null, lon=null;
let busy=false;

function setBusy(state, msg){
  busy=state;
  whereBtn.disabled=state;
  parkBtn.disabled=state;
  if(msg) statusEl.innerText=msg;
}

function showConfirmModal(){
  return new Promise(resolve=>{
    const modal=document.getElementById("modal");
    modal.style.display="flex";

    document.getElementById("confirmYes").onclick=()=>{
      modal.style.display="none";
      resolve(true);
    };

    document.getElementById("confirmNo").onclick=()=>{
      modal.style.display="none";
      resolve(false);
    };
  });
}

function getLocation(){
  if(busy) return;

  setBusy(true,"Chargement…");

  fetch(API+"?t="+Date.now())
    .then(r=>r.json())
    .then(d=>{
      if(!d.latitude){
        setBusy(false,"Aucune position");
        return;
      }

      lat=d.latitude;
      lon=d.longitude;

      map.setView([lat,lon],16);
      if(marker) map.removeLayer(marker);
      marker=L.marker([lat,lon]).addTo(map);

      setBusy(false,"Position chargée");
    });
}

function openGoogleMaps(){
  if(!lat){
    alert("Aucune position");
    return;
  }
  window.open(`https://www.google.com/maps?q=${lat},${lon}`);
}

async function parkCar(){
  if(busy) return;

  navigator.geolocation.getCurrentPosition(async pos=>{

    const confirmed=await showConfirmModal();
    if(!confirmed){
      setBusy(false,"Annulé");
      return;
    }

    setBusy(true,"Enregistrement…");

    await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({
        latitude:pos.coords.latitude,
        longitude:pos.coords.longitude,
        updatedBy:userSelect.value
      })
    });

    setBusy(false,"Position enregistrée");
    getLocation();
  });
}

getLocation();
</script>

</body>
</html>
