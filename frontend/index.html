<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Où est le Nissan ?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,Arial; background:#f2f2f7; }
    .container { padding:20px; max-width:520px; margin:auto; }
    .card { background:white; border-radius:16px; padding:15px; margin-bottom:15px; }
    button { width:100%; padding:16px; margin-top:10px; border-radius:12px; border:none; background:#007aff; color:white; }
    select { width:100%; padding:16px; font-size:18px; border-radius:12px; }
    #map { height:320px; border-radius:12px; margin-top:10px; }
    .historyItem { margin-bottom:6px; }
    .historyLink { color:#007aff; font-weight:600; text-decoration:none; }
  </style>
</head>
<body>

<div class="container">
  <h2>🚗 Où est le Nissan ?</h2>

  <div class="card">
    <select id="user"></select>
  </div>

  <div class="card">
    <button onclick="getLocation()">📍 Où est le Nissan ?</button>
    <button onclick="parkCar()">🚗 J’ai garé la voiture</button>
    <button onclick="openGoogleMaps()">🗺️ Ouvrir dans Google Maps</button>

    <div id="historyPanel">
      <div id="historyList"></div>
    </div>
  </div>

  <div class="card">
    <div id="map"></div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbznVgv8Cyt_Eo5guzlN1j1xDfqnxWBat-nZLApH3Vw_oTLdyUXKaZ_qkax0KLXgJEojmw/exec";
const USERS = ["Constance","Christine","Marie","Clement","Gregoire","Laurent","Bastien"];

const userSelect = document.getElementById("user");
USERS.forEach(u=>{
  let opt=document.createElement("option");
  opt.value=u; opt.innerText=u;
  userSelect.appendChild(opt);
});

let map=L.map("map").setView([48.8566,2.3522],13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let marker, lat=null, lon=null;

function getLocation(){
  fetch(API).then(r=>r.json()).then(d=>{
    if(!d.latitude) return;
    lat=d.latitude; lon=d.longitude;
    map.setView([lat,lon],16);
    if(marker) map.removeLayer(marker);
    marker=L.marker([lat,lon]).addTo(map);
  });
}

function renderHistory(items){
  const el=document.getElementById("historyList");
  el.innerHTML = items.map((item,i)=>{
    const url=`https://www.google.com/maps?q=${item.latitude},${item.longitude}`;
    return `<div class="historyItem">
      <a class="historyLink" href="${url}" target="_blank">(${i+1}) : Ouvrir dans Google Maps</a>
    </div>`;
  }).join("");
}

function loadHistory(){
  fetch(API+"?history=5").then(r=>r.json()).then(d=>{
    renderHistory(d.items||[]);
  });
}

function openGoogleMaps(){
  if(!lat) return;
  window.open(`https://www.google.com/maps?q=${lat},${lon}`);
}

function parkCar(){
  navigator.geolocation.getCurrentPosition(pos=>{
    fetch(API,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({
        latitude:pos.coords.latitude,
        longitude:pos.coords.longitude,
        updatedBy:userSelect.value
      })
    }).then(()=>{ getLocation(); loadHistory(); });
  });
}

getLocation();
loadHistory();
</script>

</body>
</html>
