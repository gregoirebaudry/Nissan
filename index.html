<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Où est le Nissan ?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f2f2f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Où est le Nissan ?" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #111111;
      --muted: #6e6e73;
      --blue: #007aff;
      --green: #34c759;
      --border: rgba(60, 60, 67, 0.12);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .shell {
      max-width: 560px;
      margin: 0 auto;
      padding: 18px 16px 24px;
    }
    .title {
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      margin: 10px 0 18px;
      letter-spacing: -0.02em;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 12px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    .button {
      display: block;
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.05s ease, opacity 0.15s ease;
    }
    .button:active { transform: scale(0.99); }
    .button.primary { background: var(--blue); color: white; }
    .button.success { background: var(--green); color: white; }
    .button.light {
      background: #f5f5f7;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .button:disabled { opacity: 0.6; cursor: default; }
    #map {
      height: 340px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #e9e9ee;
    }
    .status {
      min-height: 22px;
      font-size: 15px;
      color: var(--muted);
      margin-top: 10px;
    }
    .meta {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: grid;
      gap: 6px;
      font-size: 14px;
    }
    .row strong { color: var(--text); }
    .pill {
      display: inline-block;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef6ff;
      color: #0057b8;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="title">🚗 Où est le Nissan ?</div>

    <div class="card">
      <div class="label">Utilisateur</div>
      <select id="user"></select>
    </div>

    <div class="card">
      <span class="pill">Voiture partagée</span>
      <button class="button primary" id="whereBtn">📍 Où est le Nissan ?</button>
      <button class="button success" id="parkBtn">🚗 J’ai garé la voiture</button>
      <button class="button light" id="gmapsBtn">🗺️ Ouvrir dans Google Maps</button>
      <div class="status" id="status">Chargement de la dernière position…</div>
    </div>

    <div class="card">
      <div id="map"></div>
      <div class="meta">
        <div class="row"><strong>Garée par :</strong> <span id="updatedBy">—</span></div>
        <div class="row"><strong>Mise à jour :</strong> <span id="updatedAt">—</span></div>
        <div class="row"><strong>Coordonnées :</strong> <span id="coords">—</span></div>
      </div>
    </div>

    <div class="footer-note">Ajoutez cette page à l’écran d’accueil sur iPhone pour l’utiliser comme une app.</div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbx86TlKMqmybMKGrtGjCgjTlOhqEsuSISqKkak-jDE4WlC21nL2sNZ0ayjGkdOL08w1gw/exec";

    const USERS = [
      "Constance", "Christine", "Marie", "Bastien", "Clement", "Gregoire", "Laurent"
    ];

    const userSelect = document.getElementById("user");
    const statusEl = document.getElementById("status");
    const updatedByEl = document.getElementById("updatedBy");
    const updatedAtEl = document.getElementById("updatedAt");
    const coordsEl = document.getElementById("coords");
    const whereBtn = document.getElementById("whereBtn");
    const parkBtn = document.getElementById("parkBtn");
    const gmapsBtn = document.getElementById("gmapsBtn");

    let currentLat = null;
    let currentLon = null;
    let currentMarker = null;

    USERS.forEach((name) => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      userSelect.appendChild(opt);
    });

    const savedUser = localStorage.getItem("nissan-user");
    if (savedUser && USERS.includes(savedUser)) {
      userSelect.value = savedUser;
    } else {
      userSelect.value = "Gregoire";
      localStorage.setItem("nissan-user", "Gregoire");
    }

    userSelect.addEventListener("change", () => {
      localStorage.setItem("nissan-user", userSelect.value);
    });

    const map = L.map("map", { zoomControl: true }).setView([48.8566, 2.3522], 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function formatDate(isoString) {
      if (!isoString) return "—";
      const date = new Date(isoString);
      return date.toLocaleString("fr-FR", {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    function updateMap(lat, lon) {
      currentLat = Number(lat);
      currentLon = Number(lon);
      map.setView([currentLat, currentLon], 16);

      if (currentMarker) {
        map.removeLayer(currentMarker);
      }

      currentMarker = L.marker([currentLat, currentLon]).addTo(map);
      currentMarker.bindPopup("Le Nissan est ici.").openPopup();
    }

    async function fetchLatestLocation() {
      if (!API || API.includes("https://script.google.com/macros/s/AKfycbx86TlKMqmybMKGrtGjCgjTlOhqEsuSISqKkak-jDE4WlC21nL2sNZ0ayjGkdOL08w1gw/exec")) {
        setStatus("Renseignez d’abord l’URL du web app Google Apps Script dans index.html.");
        return;
      }

      setStatus("Récupération de la dernière position…");

      try {
        const response = await fetch(API, { method: "GET" });
        const data = await response.json();

        if (!data || !data.latitude || !data.longitude) {
          updatedByEl.textContent = "—";
          updatedAtEl.textContent = "—";
          coordsEl.textContent = "—";
          setStatus("Aucune position enregistrée pour le moment.");
          return;
        }

        updateMap(data.latitude, data.longitude);
        updatedByEl.textContent = data.updatedBy || "—";
        updatedAtEl.textContent = formatDate(data.updatedAt);
        coordsEl.textContent = `${Number(data.latitude).toFixed(6)}, ${Number(data.longitude).toFixed(6)}`;
        setStatus("Dernière position chargée.");
      } catch (error) {
        console.error(error);
        setStatus("Impossible de récupérer la position.");
      }
    }

    function openGoogleMaps() {
      if (currentLat === null || currentLon === null) {
        alert("Aucune position enregistrée pour le moment.");
        return;
      }
      const url = `https://www.google.com/maps?q=${currentLat},${currentLon}`;
      window.open(url, "_blank");
    }

    async function saveCurrentLocation() {
      if (!navigator.geolocation) {
        alert("La géolocalisation n’est pas prise en charge sur cet appareil.");
        return;
      }

      if (!API || API.includes("https://script.google.com/macros/s/AKfycbx86TlKMqmybMKGrtGjCgjTlOhqEsuSISqKkak-jDE4WlC21nL2sNZ0ayjGkdOL08w1gw/exec")) {
        alert("Ajoutez d’abord l’URL du web app Google Apps Script dans index.html.");
        return;
      }

      setStatus("Récupération de votre position…");
      parkBtn.disabled = true;

      navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const user = userSelect.value;
        const confirmed = window.confirm(`Confirmer que ${user} a garé la voiture ici ?`);

        if (!confirmed) {
          parkBtn.disabled = false;
          setStatus("Enregistrement annulé.");
          return;
        }

        setStatus("Enregistrement de la position…");

        try {
          const response = await fetch(API, {
            method: "POST",
            headers: {
              "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({
              latitude: lat,
              longitude: lon,
              updatedBy: user
            })
          });

          const data = await response.json();

          if (!data.success) {
            throw new Error(data.error || "Erreur inconnue");
          }

          setStatus("Position enregistrée.");
          await fetchLatestLocation();
        } catch (error) {
          console.error(error);
          setStatus("Impossible d’enregistrer la position.");
        } finally {
          parkBtn.disabled = false;
        }
      }, (error) => {
        console.error(error);
        parkBtn.disabled = false;
        setStatus("Impossible d’obtenir votre position.");
      }, {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      });
    }

    whereBtn.addEventListener("click", fetchLatestLocation);
    parkBtn.addEventListener("click", saveCurrentLocation);
    gmapsBtn.addEventListener("click", openGoogleMaps);

    fetchLatestLocation();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
